version: 2

models:
  - name: gld_program_operations__attendance
    description: "This model summarizes participant attendance per program week per lesson"
    config:
      materialized: table
      contract: # Model contract (run BEFORE model is built)
        enforced: true
    constraints:
      - type: primary_key
        columns: [program_code,primary_user_service_id,week_number,lesson_title]
        warn_unenforced: false
    columns:
      - name: program_code
        description: 'program_code '
        data_type: string


      - name: week_number
        description: 'Week number of the program from the program start date'
        data_type: string

      - name: week_range
        description: "Range of dates that week number correspond"
        data_type: string

      - name: primary_user_service_id
        description: "Primary user  id of the learner"
        data_type: string

      - name: participant_name
        description: "Name of the learner"
        data_type: string

      - name: participant_email
        description: "Learner email"
        data_type: string

      - name: lesson_title
        description: "Title of the lesson for that given week"
        data_type: string

      - name: week_attendance
        description: "Flag that identify if the learner is absent or attended that given lesson. If the attendance_percentage is under 50% it will show as absent"
        data_type: string

      - name: has_excused_attendance
        description: "Flag that identify if the learner has a excused attendance for that given lesson"
        data_type: boolean

      - name: is_exempt
        description: "Flag that identify if the learner is exempt from that lesson"
        data_type: string

      - name: has_waived_attendance
        description: "Flag that identify if the learner has waived attendance for that lesson"
        data_type: boolean

      - name: attendance_percentage
        description: "The percentage of time the learner was present during the lesson."
        data_type: float
        
      - name: is_exempt
        description: "Flag that identify if the learner is exempt from that lesson"
        data_type: boolean

      - name: attendance_overall_status
        description: "Final status considering excused, waived, exempt cases and flagging when is attended but under 50%"
        data_type: string
